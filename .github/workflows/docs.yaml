name: docs

on:
  push:
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 23
      - name: Setup sbt
        uses: sbt/setup-sbt@v1
      - name: clone Liftoff and run sbt publishLocal
        run: |
          git clone https://github.com/tjarker/liftoff.git
          cd liftoff
          sbt 'publishLocal; macros/publishLocal'
      - name: generate Verilog
        run: sbt run

      - name: Build docs
        uses: TinyTapeout/tt-gds-action/docs@ttihp26a
